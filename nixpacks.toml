[phases.setup]
nixpkgs = ["php82", "php82Packages.composer", "nodejs-16_x", "php82Extensions.pdo_mysql"]

[phases.install]
# Perintah sakti: hapus lock lama, lalu install ulang dengan mengabaikan batasan versi
cmds = [
    "npm install",
    "composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-scripts"
]

[phases.build]
dependsOn = ["install"]
cmds = [
    "npm run production",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"

[variables]
NIXPACKS_PHP_FALLBACK_VERSION = "8.2"